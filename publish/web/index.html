<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Orchestration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>📋 Life Orchestration</h1>
        
        <div class="row mt-4">
            <div class="col-md-8">
                <div class="mb-3">
                    <input type="text" id="searchInput" class="form-control" placeholder="Sök..." oninput="filterTasks()">
                </div>
                <h3>Tasks</h3>
                <ul id="taskList" class="list-group"></ul>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>➕ New Task</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-2">
                            <input type="text" id="taskTitle" class="form-control" placeholder="Titel">
                        </div>
                        <div class="mb-2">
                            <select id="taskAssignee" class="form-select">
                                <option value="">Välj ansvarig...</option>
                                <option value="Robert">Robert</option>
                                <option value="Lilly">Lilly</option>
                                <option value="Johanna">Johanna</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <input type="date" id="taskDueDate" class="form-control" placeholder="Förfallodatum (frivilligt)">
                        </div>
                        <div class="mb-2">
                            <select id="taskRequestor" class="form-select">
                                <option value="">Bevakare (frivilligt)...</option>
                                <option value="Robert">Robert</option>
                                <option value="Lilly">Lilly</option>
                                <option value="Johanna">Johanna</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <select id="taskPriority" class="form-select">
                                <option value="1">Medium</option>
                                <option value="0">Low</option>
                                <option value="2">High</option>
                                <option value="3">Critical</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <select id="taskCategory" class="form-select">
                                <option value="">Kategori (frivilligt)...</option>
                                <option value="work">Arbeta</option>
                                <option value="home">Hem</option>
                                <option value="health">Hälsa</option>
                                <option value="finance">Finans</option>
                                <option value="learning">Lärande</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <textarea id="taskDescription" class="form-control" placeholder="Beskrivning (frivilligt)" rows="2"></textarea>
                        </div>
                        <button id="createBtn" class="btn btn-primary w-100">Skapa</button>
                    </div>
                </div>
                <div id="message" class="mt-2"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://192.168.1.194:3080';
        let allTasks = [];
        
        async function loadTasks() {
            try {
                const res = await fetch(API_URL + '/api/tasks');
                allTasks = await res.json();
                filterTasks();
            } catch (e) {
                showMessage('Error: ' + e.message, 'danger');
            }
        }
        
        function filterTasks() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTasks.filter(t => 
                t.title.toLowerCase().includes(searchText) ||
                t.assignee.toLowerCase().includes(searchText) ||
                (t.description && t.description.toLowerCase().includes(searchText)) ||
                (t.category && t.category.toLowerCase().includes(searchText))
            );
            renderTasks(filtered);
        }
        
        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            if (tasks.length === 0) {
                list.innerHTML = '<li class="list-group-item text-muted">Inga tasks hittades.</li>';
                return;
            }
            list.innerHTML = tasks.map(t => `
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <span class="me-2">${getStatusIcon(t.status)}</span>
                            <strong>${t.title}</strong>
                            <span class="text-muted ms-2">— ${t.assignee}</span>
                            ${t.dueDate ? `<span class="badge bg-warning ms-2">⏰ ${formatDate(t.dueDate)}</span>` : ''}
                            ${t.requestor ? `<span class="badge bg-info ms-2">👁 ${t.requestor}</span>` : ''}
                            ${t.priority > 1 ? `<span class="badge bg-danger ms-2">${getPriorityIcon(t.priority)} ${t.priority}</span>` : ''}
                            ${t.category ? `<span class="badge bg-secondary ms-2">🏷 ${t.category}</span>` : ''}
                            ${t.description ? `<div class="text-muted small mt-1">📝 ${t.description}</div>` : ''}
                        </div>
                        <div class="btn-group btn-group-sm">
                            ${t.status !== 2 ? `<button class="btn btn-success btn-sm" onclick="updateStatus(${t.id}, 2)">✓</button>` : ''}
                            ${t.status === 0 ? `<button class="btn btn-primary btn-sm" onclick="updateStatus(${t.id}, 1)">▶</button>` : ''}
                            <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">✕</button>
                        </div>
                    </li>
                `).join('');
        }
        
        function getStatusIcon(status) {
            return ['[ ]', '[~]', '[✓]'][status] || '[?]';
        }
        
        async function createTask() {
            const title = document.getElementById('taskTitle').value;
            const assignee = document.getElementById('taskAssignee').value;
            const dueDate = document.getElementById('taskDueDate').value;
            const requestor = document.getElementById('taskRequestor').value;
            const priority = parseInt(document.getElementById('taskPriority').value);
            const category = document.getElementById('taskCategory').value;
            const description = document.getElementById('taskDescription').value;
            if (!title || !assignee) {
                showMessage('Titel och ansvarig krävs!', 'warning');
                return;
            }
            try {
                const body = { title, assignee, priority, description };
                if (dueDate) body.dueDate = dueDate;
                if (requestor) body.requestor = requestor;
                if (category) body.category = category;
                const res = await fetch(API_URL + '/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (res.ok) {
                    document.getElementById('taskTitle').value = '';
                    document.getElementById('taskAssignee').value = '';
                    document.getElementById('taskDueDate').value = '';
                    document.getElementById('taskRequestor').value = '';
                    document.getElementById('taskPriority').value = '1';
                    document.getElementById('taskCategory').value = '';
                    document.getElementById('taskDescription').value = '';
                    showMessage('Skapad!', 'success');
                    loadTasks();
                }
            } catch (e) {
                showMessage('Error: ' + e.message, 'danger');
            }
        }
        
        function getPriorityIcon(priority) {
            return ['🔽', '', '🔺', '🚨'][priority] || '';
        }
        
        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toISOString().split('T')[0];
        }
        
        async function updateStatus(id, status) {
            try {
                await fetch(API_URL + '/api/tasks/' + id, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                loadTasks();
            } catch (e) {
                showMessage('Error: ' + e.message, 'danger');
            }
        }
        
        async function deleteTask(id) {
            try {
                await fetch(API_URL + '/api/tasks/' + id, { method: 'DELETE' });
                loadTasks();
            } catch (e) {
                showMessage('Error: ' + e.message, 'danger');
            }
        }
        
        function showMessage(text, type) {
            document.getElementById('message').innerHTML = 
                `<div class="alert alert-${type}">${text}</div>`;
            setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
        }
        
        document.getElementById('createBtn').addEventListener('click', createTask);
        loadTasks();
    </script>
</body>
</html>
